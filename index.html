<!DOCTYPE html>
<html lang="en" class="no-touch">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        var theme = localStorage.getItem('o9ds-theme') || 'dark';
        var root = document.documentElement;
        if (theme === 'dark') {
          root.classList.add('dark');
        } else {
          root.classList.remove('dark');
        }
        root.setAttribute('data-theme', theme);
        if (document.body) document.body.setAttribute('data-theme', theme);
      })();
    </script>
    <link rel="icon" type="image/svg+xml" sizes="any" href="/favicon.svg" />
    <!-- Home: hero + first carousel/section images — earlier fetch, faster LCP -->
    <link rel="preload" href="/hero-1.svg" as="image" type="image/svg+xml" />
    <link rel="preload" href="/hero-2.svg" as="image" type="image/svg+xml" />
    <link rel="preload" href="/hero-3.svg" as="image" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>o9ds Design System</title>
    <!-- o9Sans + o9con @font-face: loaded once via Vite bundle (main.jsx) to avoid duplicate requests vs /o9SansFont + /o9ConIconFont -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
